# robot_localization — dual EKF + navsat_transform.
#
# Why two filters (this is the standard GPS pattern, not over-engineering):
#
#   ekf_local   world_frame: odom   publishes odom->base_link
#               Fuses wheel odometry + IMU only. Smooth and continuous — it never
#               jumps, because nothing in it is an absolute measurement. This is
#               what the controller drives on.
#
#   ekf_global  world_frame: map    publishes map->odom
#               Same inputs PLUS the GPS (via navsat_transform). It DOES jump
#               when the NEO-6M wanders ~5 m (docs/handoff.md decision 5). Those
#               jumps land in map->odom, so base_link's motion stays smooth.
#
# Both filters consume the wheel odometry's TWIST only (vx, vyaw), never its
# pose: the pose is a dead-reckoned integral that drifts without bound, and
# feeding it in as an absolute measurement would drag the estimate along with it.
#
# two_d_mode: true — a four-point static platform on the ground. Pinning
# z/roll/pitch to zero throws away states the sensors cannot observe anyway and
# stops the 6-axis IMU's drift from leaking into the horizontal estimate.

ekf_local:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true
    debug: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Order of the 15 flags:
    #   x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az
    odom0: odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # ⚠️ imu/data_raw — the UNFUSED IMU, on purpose. ekf_local takes yaw RATE and
    # ax, never absolute yaw, so that a bad heading can never yank base_link
    # around. Everything downstream of odom->base_link (the controller, the local
    # costmap) needs smooth and continuous far more than it needs true.
    # The magnetometer's heading goes to ekf_global instead, where a jump lands
    # in map->odom and nothing driving the robot feels it.
    imu0: imu/data_raw
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

ekf_global:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true
    debug: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    odom0: odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # GPS, already converted into the map frame by navsat_transform_node.
    # Absolute x/y only — course-over-ground yaw is meaningless below ~1 m/s.
    odom1: odometry/gps
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 10
    odom1_differential: false
    odom1_relative: false

    # ⚠️ imu/data — the MADGWICK-FUSED IMU, with a real orientation in it,
    # because ABSOLUTE YAW IS ON HERE (index 5). This is the whole point of the
    # magnetometer: without it, nothing observes heading, ekf_global's yaw is
    # unobservable, and GPS position updates rotate it — measured at -178 deg
    # while the truth was +38.8. ekf_global publishes map->odom, so that wrong
    # yaw turned every Nav2 goal and GPS waypoint following simply did not work.
    #
    # Yaw is enabled HERE and NOT in ekf_local, deliberately: a bad heading fix
    # then moves map->odom, which nothing driving the robot is holding onto.
    imu0: imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_queue_size: 20
    # false = treat yaw as an absolute measurement, which is exactly what it now
    # is. Setting this true would differentiate it back into a rate and throw
    # away the only absolute heading the robot has.
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

navsat_transform:
  ros__parameters:
    frequency: 30.0
    # Ignore the first fixes: the NEO-6M's early ones are the worst it will emit.
    delay: 3.0

    # ⚠️ NOW MEANINGFUL — the heading finally comes from a magnetometer, so
    # there is a magnetic bearing to correct. Declination is the angle between
    # magnetic and true north; get it wrong and the robot drives at a constant
    # angle to every GPS course.
    # 0.0 while there was no magnetometer, and set to 0.112 (Istanbul) here would
    # have rotated the map frame by 6.4 degrees for nothing — it did, and
    # `ros2 service call /fromLL` is how that was caught.
    # ⚠️ TODO: set for YOUR site before any outdoor run —
    # https://www.ngdc.noaa.gov/geomag/calculators/magcalc.shtml
    # Istanbul is ~+6.4 deg east = 0.112 rad. Left at 0.0 because the simulator's
    # field has no declination, and a real number here would silently break the
    # sim tests while looking more correct.
    magnetic_declination_radians: 0.0

    # 0.0 assumes the IMU's yaw follows REP-103 (0 = east, ENU).
    # ⚠️ TODO at B6: verify by pointing the robot east and reading /imu/data.
    # Many drivers report 0 = north, which would need pi/2 here.
    yaw_offset: 0.0

    # navsat_transform reads the robot's absolute heading from /imu/data's
    # ORIENTATION quaternion, to know how the map frame sits against UTM north.
    # false = take it from the IMU (now genuinely magnetometer-backed via
    # imu_filter_madgwick) rather than from wheel odometry, whose yaw has no
    # absolute reference at all and must never seed the GPS transform.
    #
    # ⚠️ THIS ONLY WORKS BECAUSE THE MAGNETOMETER EXISTS. Before it, the 6-axis
    # IMU published orientation_covariance[0] = -1 ("no orientation here") and
    # navsat_transform — which never checks that flag — read the identity
    # quaternion and concluded "facing east". It appeared to work in simulation
    # purely because robot_sim starts the robot at yaw 0. On real ground, facing
    # north, every GPS waypoint would have been 90 degrees out.
    # If the magnetometer is ever removed or fails, this breaks silently again.
    use_odometry_yaw: false
    # false = the first valid fix becomes the map origin. That fix carries the
    # GPS's full error, so the map frame is anchored a few metres off the true
    # world — measured at 5.45 m in one run. Harmless for relative navigation
    # (goals are converted through the same anchor), but it means map
    # coordinates are NOT ground truth. Set a fixed datum instead when we want
    # the same map frame across runs at a known site.
    wait_for_datum: false

    zero_altitude: true
    broadcast_utm_transform: false
    publish_filtered_gps: true
