# robot_localization — dual EKF + navsat_transform.
#
# Why two filters (this is the standard GPS pattern, not over-engineering):
#
#   ekf_local   world_frame: odom   publishes odom->base_link
#               Fuses wheel odometry + IMU only. Smooth and continuous — it never
#               jumps, because nothing in it is an absolute measurement. This is
#               what the controller drives on.
#
#   ekf_global  world_frame: map    publishes map->odom
#               Same inputs PLUS the GPS (via navsat_transform). It DOES jump
#               when the NEO-6M wanders ~5 m (docs/handoff.md decision 5). Those
#               jumps land in map->odom, so base_link's motion stays smooth.
#
# Both filters consume the wheel odometry's TWIST only (vx, vyaw), never its
# pose: the pose is a dead-reckoned integral that drifts without bound, and
# feeding it in as an absolute measurement would drag the estimate along with it.
#
# two_d_mode: true — a four-point static platform on the ground. Pinning
# z/roll/pitch to zero throws away states the sensors cannot observe anyway and
# stops the 6-axis IMU's drift from leaking into the horizontal estimate.

ekf_local:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true
    debug: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Order of the 15 flags:
    #   x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az
    odom0: odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # 6-axis IMU: yaw RATE is trustworthy, absolute yaw is not (no magnetometer
    # yet — handoff decision 4). Take vyaw and ax; leave yaw to the global filter
    # once the QMC5883L is on the mast.
    imu0: imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

ekf_global:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true
    debug: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    odom0: odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # GPS, already converted into the map frame by navsat_transform_node.
    # Absolute x/y only — course-over-ground yaw is meaningless below ~1 m/s.
    odom1: odometry/gps
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 10
    odom1_differential: false
    odom1_relative: false

    imu0: imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    # TODO once the magnetometer is mounted and calibrated: flip the yaw flag
    # (index 5) to true here — NOT in ekf_local, so a bad heading fix cannot
    # yank base_link around.

navsat_transform:
  ros__parameters:
    frequency: 30.0
    # Ignore the first fixes: the NEO-6M's early ones are the worst it will emit.
    delay: 3.0

    # ⚠️ MUST STAY 0.0 UNTIL THE MAGNETOMETER EXISTS.
    # Declination corrects a MAGNETOMETER's reading from magnetic north to true
    # north. We have no magnetometer, so the yaw navsat_transform reads is not a
    # magnetic bearing and there is nothing to correct — adding declination just
    # rotates the map frame by that angle. It was set to 0.112 (Istanbul) here
    # and did exactly that: every GPS coordinate came back 6.4 degrees rotated.
    # Measured with `ros2 service call /fromLL ...` against known offsets.
    # TODO with the QMC5883L (roadmap A4/B6): set it for the site —
    # https://www.ngdc.noaa.gov/geomag/calculators/magcalc.shtml (Istanbul ~0.112).
    magnetic_declination_radians: 0.0

    # 0.0 assumes the IMU's yaw follows REP-103 (0 = east, ENU).
    # ⚠️ TODO at B6: verify by pointing the robot east and reading /imu/data.
    # Many drivers report 0 = north, which would need pi/2 here.
    yaw_offset: 0.0

    # ⚠️⚠️ THE BIG ONE — navsat_transform NEEDS AN ABSOLUTE HEADING, AND WE HAVE NONE.
    #
    # It reads the robot's heading from /imu/data's ORIENTATION quaternion, to
    # know how the map frame sits against UTM north. Our MPU6050 is 6-axis: it
    # publishes orientation_covariance[0] = -1, meaning "there is no orientation
    # here" (mpu6050_driver refuses to invent one). navsat_transform does not
    # check that flag — it reads the identity quaternion and concludes yaw = 0,
    # i.e. "the robot is facing east".
    #
    # In simulation that is true BY LUCK: robot_sim starts the robot at yaw 0.
    # So the GPS waypoint tests pass, and they would pass just the same if this
    # were completely broken. On the real robot, starting facing north puts every
    # GPS waypoint 90 degrees out.
    #
    # This is handoff decision 4 arriving with a bill. GPS waypoint following is
    # NOT usable outdoors until either:
    #   a) the QMC5883L is mounted and calibrated (the real fix), or
    #   b) a heading-init manoeuvre runs first (drive 5 m straight, take the
    #      heading from GPS course-over-ground, seed the filter) and
    #      use_odometry_yaw is set true here.
    use_odometry_yaw: false
    # false = the first valid fix becomes the map origin. That fix carries the
    # GPS's full error, so the map frame is anchored a few metres off the true
    # world — measured at 5.45 m in one run. Harmless for relative navigation
    # (goals are converted through the same anchor), but it means map
    # coordinates are NOT ground truth. Set a fixed datum instead when we want
    # the same map frame across runs at a known site.
    wait_for_datum: false

    zero_altitude: true
    broadcast_utm_transform: false
    publish_filtered_gps: true
