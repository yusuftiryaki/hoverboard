; ESP32 bridge — build with:  pio run
; flash with:                 pio run -t upload -e esp32dev  (needs USB device)
; serial monitor:             pio device monitor -b 115200
;
; Flashing on WSL2: attach the ESP32's USB-serial into WSL with usbipd-win first
; (see docs/devcontainer.md), OR copy .pio/build/esp32dev/firmware.bin to the Pi
; and flash there with esptool. Compilation never needs the hardware.

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600
; upload_port = /dev/ttyUSB0   ; uncomment/set when a device is attached

build_flags = -Wall
